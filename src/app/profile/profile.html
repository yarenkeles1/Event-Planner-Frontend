<div class="form-page">
  <div class="form-card profile-card">
    <div class="accent-bar"></div>
    
    <div class="card-head text-center">
      <h2>Hesap Detayları</h2>
      <p>Profilinizi ve hesap detaylarınızı buradan görüntüleyebilirsiniz.</p>
    </div>

    <div class="profile-stats row text-center mb-4 g-2">
      <div class="col-6">
        <div class="stat-box">
          <span class="stat-number">{{ createdEventsCount() }}</span>
          <span class="stat-label">Düzenlenen</span>
        </div>
      </div>
      <div class="col-6">
        <div class="stat-box">
          <span class="stat-number">{{ joinedEventsCount() }}</span>
          <span class="stat-label">Katılınan</span>
        </div>
      </div>
    </div>

    <div class="profile-info-section mb-4">
      <div class="form-group">
        <label class="form-label">Ad Soyad</label>
        <div class="input-wrap disabled-wrap">
          <i class="ti ti-user input-icon"></i>
          <input class="form-input" type="text" [value]="fullName()" disabled />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">E-Posta Adresi</label>
        <div class="input-wrap disabled-wrap">
          <i class="ti ti-mail input-icon"></i>
          <input class="form-input" type="email" [value]="email()" disabled />
        </div>
      </div>
    </div>

  </div>
</div>
